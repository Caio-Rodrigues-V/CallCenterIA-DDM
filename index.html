<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23F97316'/%3E%3Cpath d='M20 18h24v28H20z' fill='white' opacity='.18'/%3E%3Cpath d='M25 24h14a5 5 0 0 1 0 10h-4l5 6h-6l-4-6h-5z' fill='white'/%3E%3C/svg%3E" />
    <title>Callcenter IA - DDM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#F97316', 
              'primary-hover': '#EA580C',
              secondary: '#64748B',
              success: '#22C55E',
              danger: '#EF4444',
              background: '#F8FAFC',
              surface: '#FFFFFF',
              dark: {
                bg: '#0F172A', 
                surface: '#1E293B', 
                border: '#334155',
              }
            },
            borderRadius: {
              // TECH/SHARP AESTHETIC: Smaller radius for a precision tool feel
              'none': '0',
              'sm': '0.125rem', // 2px
              DEFAULT: '0.25rem', // 4px
              'md': '0.375rem', // 6px
              'lg': '0.5rem', // 8px
              'xl': '0.75rem', // 12px
              '2xl': '1rem', // 16px
              '3xl': '1.5rem', // 24px
              'full': '9999px',
            },
            boxShadow: {
              // DEPTH SYSTEM: Layered shadows
              'sm': '0 1px 2px 0 rgb(0 0 0 / 0.05)',
              DEFAULT: '0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1)',
              'md': '0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1)',
              'lg': '0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1)',
              'glow': '0 0 15px rgba(249, 115, 22, 0.3)', // Primary glow
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out',
              'slide-up': 'slideUp 0.4s ease-out',
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'ping-slow': 'ping 2s cubic-bezier(0, 0, 0.2, 1) infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(10px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      
      body {
        font-family: 'Inter', sans-serif;
        /* Subtle noise texture for depth (emulated with CSS) */
        background-color: #F8FAFC;
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 20px 20px;
        background-attachment: fixed;
      }
      
      .dark body {
        background-color: #0F172A;
        background-image: radial-gradient(#1e293b 1px, transparent 1px);
      }

      /* Micro-interactions */
      .btn-click {
        transition: transform 0.05s ease-in-out;
      }
      .btn-click:active {
        transform: scale(0.97);
      }

      /* Transitions */
      .page-transition {
        animation: fadeIn 0.3s ease-out;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 3px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #475569; 
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.12.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2",
    "xlsx": "https://esm.sh/xlsx@0.18.5"
  }
}
</script>
</head>
  <body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-200">

  </body>
</html>
